# Codemagic CI — build Ghost Run for iOS and upload to TestFlight WITHOUT a Mac.
#
# This is a TEMPLATE. Before it runs you must, in the Codemagic UI:
#   1. Connect this repository.
#   2. Add an App Store Connect API key integration (Issuer ID, Key ID, .p8)
#      and name it exactly "GhostRunASC" (or change the name below).
#   3. Register the bundle id com.ghostrun.game in your Apple Developer account
#      and create the app record in App Store Connect.
#
# Docs: https://docs.codemagic.io/yaml-quick-start/building-a-native-ios-app/

workflows:
  ios-testflight:
    name: Ghost Run iOS → TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: GhostRunASC
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ghostrun.game
      vars:
        BUNDLE_ID: "com.ghostrun.game"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        APP_STORE_APPLE_ID: "0000000000" # replace with your numeric App ID from App Store Connect
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install JS dependencies
        script: npm ci
      - name: Build web bundle
        script: npm run build
      - name: Add & sync iOS platform
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Generate app icons
        script: |
          npx @capacitor/assets generate --ios --iconBackgroundColor '#0a0a1a' --splashBackgroundColor '#0a0a1a' || true
          npx cap sync ios
      - name: Set build number from Codemagic counter
        script: |
          cd ios/App
          agvtool new-version -all "$BUILD_NUMBER"
      - name: Set up signing
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Internal testers get the build automatically once processed.
